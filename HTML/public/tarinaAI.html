<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenStoryAPI</title>
    <style>
        html, body {
            min-height: 100%;
            margin: 0;
        }

        html {
            background: linear-gradient(120deg, #0f172a, #1e3a8a, #243b55, #020617);
            background-size: 600% 600%;
            animation: gradientFlow 20s ease infinite;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.04), transparent 60%);
            pointer-events: none;
            animation: lightDrift 20s ease-in-out infinite;
        }

        @keyframes lightDrift {
            0% { transform: translate(0, 0); }
            50% { transform: translate(40px, 60px); }
            100% { transform: translate(0, 0); }
        }

        html::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
                radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 3px 3px, 6px 6px;
            opacity: 0.15;
            pointer-events: none;
            animation: starDrift 120s linear infinite;
        }

        @keyframes starDrift {
            from { transform: translateY(0); }
            to { transform: translateY(-200px); }
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            25% { background-position: 50% 0%; }
            50% { background-position: 100% 50%; }
            75% { background-position: 50% 100%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 16px;
            font-family: Helvetica, Arial, sans-serif;
            gap: 32px;
            color: #ffffff;
        }

        .div {
            animation: fadeInUp 0.8s ease forwards, floatIn 0.8s ease forwards;
            background: rgba(18, 25, 41, 0.9);
            backdrop-filter: blur(5px);
            padding: 2rem;
            border-radius: 20px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 0 60px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: relative;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes floatIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .div:hover {
            transform: translateY(-6px);
            box-shadow: 0 0 90px rgba(80,120,255,0.35);
        }

        h1, h2 {
            text-align: center;
            text-shadow: 0 0 10px rgba(120,160,255,0.4), 0 0 30px rgba(120,160,255,0.15);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input, button {
            background-color: #1e1e2f;
            color: #ffffff;
            font-size: large;
            font-weight: 600;
            padding: 10px 14px;
            border-radius: 30px;
            box-shadow: 0 0 60px rgba(0,0,0,0.5);
            border: none;
        }

        input {
            outline: none;
            transition: box-shadow 0.3s ease, transform 0.25s ease, background-color 0.3s ease;
        }

        input:focus {
            background-color: #22305a;
            box-shadow: 0 0 0 2px rgba(120,160,255,0.4), 0 0 25px rgba(120,160,255,0.6);
            transform: scale(1.02);
        }

        button {
            cursor: pointer;
        }

        button:hover {
            background-color: #2a3a5f;
            transform: scale(1.03);
            transition: 0.3s ease;
        }

        #storyOutput {
            white-space: pre-wrap;
            line-height: 1.7;
            font-size: 1.05rem;
            color: rgba(255,255,255,0.9);
        }

        #status {
            text-align: center;
            color: #cbd5e1;
            min-height: 24px;
        }

        @media (max-width: 500px) {
            .div {
                padding: 1rem;
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <h1>TARINA AI</h1>

    <div class="div">
        <form id="ai_data">
            <h2>Syötä prompt</h2>
            <input type="text" name="prompt" placeholder="Prompt for AI" required>

            <h2>Syötä tarinan merkkien määrä</h2>
            <input type="number" name="length" min="1" max="2000" value="250" required>

            <h2>Syötä temperature</h2>
            <input type="number" name="temperature" min="0.1" max="2.0" step="0.01" value="0.7" required>

            <h2>Syötä top-k</h2>
            <input type="number" name="top_k" min="1" max="20" value="5" required>

            <h2>Syötä repetition penalty</h2>
            <input type="number" name="repetition_penalty" min="0.1" max="2.0" step="0.01" value="1.15" required>

            <button type="submit">Luo tarina</button>
        </form>

        <div id="status"></div>
    </div>

    <div class="div">
        <h2>Tarina</h2>
        <p id="storyOutput">Tarina ilmestyy tähän...</p>
    </div>

    <script>
        const form = document.querySelector('#ai_data');
        const storyOutput = document.querySelector('#storyOutput');
        const statusEl = document.querySelector('#status');

        form.addEventListener('submit', async function(event) {
            event.preventDefault();

            const data = new FormData(form);
            const values = Object.fromEntries(data.entries());

            values.length = Number(values.length);
            values.temperature = Number(values.temperature);
            values.top_k = Number(values.top_k);
            values.repetition_penalty = Number(values.repetition_penalty);

            statusEl.textContent = 'Luodaan tarinaa...';
            storyOutput.textContent = '';

            try {
                const response = await fetch('https://storygru.onrender.com/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(values)
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const storyData = await response.json();
                storyOutput.textContent = storyData.story ?? 'Tarinaa ei saatu.';
                statusEl.textContent = 'Valmis.';
            } catch (error) {
                console.error('Virhe:', error);
                statusEl.textContent = 'Virhe palvelinyhteydessä.';
                storyOutput.textContent = 'Tarinan luonti epäonnistui.';
            }
        });
    </script>
</body>
</html>
